service-name: ${ECS_SERVICE_NAME}
cluster: ${ECS_CLUSTER_NAME}
image: ${N8N_IMAGE}
container-port: 5678
cpu: '1024'
memory: '2048'
cpu-architecture: ARM64
health-check-path: /healthz
min-task-count: 2
max-task-count: 4
auto-scaling-metric: AVERAGE_CPU
auto-scaling-target-value: 70
command:
  - n8n
  - start
environment-variables:
  - name: N8N_HOST
    value: ${N8N_HOST}
  - name: N8N_PROTOCOL
    value: https
  - name: N8N_PORT
    value: '5678'
  - name: N8N_EDITOR_BASE_URL
    value: ${N8N_EDITOR_BASE_URL}
  - name: WEBHOOK_URL
    value: ${WEBHOOK_URL}
  - name: DB_TYPE
    value: postgresdb
  - name: DB_POSTGRESDB_HOST
    value: ${DB_POSTGRESDB_HOST}
  - name: DB_POSTGRESDB_PORT
    value: '5432'
  - name: DB_POSTGRESDB_DATABASE
    value: n8n
  - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
    value: 'true'
  - name: N8N_SECURE_COOKIE
    value: 'true'
  - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
    value: 'true'
  - name: N8N_DIAGNOSTICS_ENABLED
    value: 'false'
  - name: N8N_PERSONALIZATION_ENABLED
    value: 'false'
  - name: N8N_HIRING_BANNER_ENABLED
    value: 'false'
  - name: N8N_PAYLOAD_SIZE_MAX
    value: '16'
  - name: GENERIC_TIMEZONE
    value: UTC
secrets:
  - name: DB_POSTGRESDB_USER
    valueFrom: ${DB_USER_SECRET_ARN}
  - name: DB_POSTGRESDB_PASSWORD
    valueFrom: ${DB_PASSWORD_SECRET_ARN}
  - name: N8N_ENCRYPTION_KEY
    valueFrom: ${N8N_ENCRYPTION_KEY_SECRET_ARN}
  - name: N8N_BASIC_AUTH_ACTIVE
    valueFrom: ${N8N_BASIC_AUTH_ACTIVE_SECRET_ARN}
  - name: N8N_BASIC_AUTH_USER
    valueFrom: ${N8N_BASIC_AUTH_USER_SECRET_ARN}
  - name: N8N_BASIC_AUTH_PASSWORD
    valueFrom: ${N8N_BASIC_AUTH_PASSWORD_SECRET_ARN}
tags:
  - key: Project
    value: n8n
  - key: ManagedBy
    value: github-actions
